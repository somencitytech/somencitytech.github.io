<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>S Creation AI Assistant</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

.chat{
    width:100%;
    max-width:420px;
    height:650px;
    margin:20px auto;
    background:#fff;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
    display:flex;
    flex-direction:column;
}

.header{
    background:#0d6efd;
    color:#fff;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

.messages{
    flex:1;
    overflow:auto;
    padding:15px;
}

.user{
    background:#0d6efd;
    color:#fff;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    text-align:right;
}

.bot{
    background:#efefef;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

.bottom{
    display:flex;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    border:none;
    padding:15px;
    font-size:16px;
}

button{
    border:none;
    background:#0d6efd;
    color:#fff;
    width:90px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="chat">

<div class="header">
🤖 S Creation AI
</div>

<div id="messages" class="messages">

<div class="bot">
Hello 👋<br><br>
Welcome to S Creation.<br>
How can I help you today?
</div>

</div>

<div class="bottom">
<input id="txt" placeholder="Type your question...">
<button onclick="send()">Send</button>
</div>

</div>

<script>

const API_KEY="AQ.Ab8RN6L70dWw4L2p-b7a4mvXmKNlDsUoICTwpVb3zLXowEtbMg";

async function send(){

let text=document.getElementById("txt").value;

if(text=="") return;

messages.innerHTML+=`<div class='user'>${text}</div>`;

document.getElementById("txt").value="";

let response=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{text:text}
]
}
]
})
});

let data=await response.json();

let reply="Sorry, no response.";

try{
reply=data.candidates[0].content.parts[0].text;
}catch(e){}

messages.innerHTML+=`<div class='bot'>${reply}</div>`;

messages.scrollTop=messages.scrollHeight;

}

</script>

</body>
</html>
