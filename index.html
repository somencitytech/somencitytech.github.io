<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayliteHR Status</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        h1 {
            text-align: center;
            color: #222;
            margin-bottom: 30px;
        }

        .summary {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .service-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .up {
            background: #28a745;
        }

        .down {
            background: #dc3545;
        }

        .paused {
            background: #ffc107;
            color: #000;
        }

        .unknown {
            background: #6c757d;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 13px;
        }

        .refresh {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #0078d4;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #005fa3;
        }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align:center; margin-bottom:20px;">
        <img src="https://www.paylitehr.com/wp-content/uploads/2025/11/paylite-logo-b.webp" alt="PayliteHR" style="max-width:220px; margin-bottom:10px;">
        <h1>PayliteHR Status</h1>
    </div>

    <div class="summary" id="summary">
        Loading status...
    </div>

    <div class="refresh">
        <button onclick="loadStatus()">Refresh Status</button>
    </div>

    <div class="status-grid" id="statusGrid"></div>

    <div class="footer">
        Powered by UptimeRobot API
    </div>
</div>

<script>

const apiKeys = [
    'm800959382-bebdb4ea0602d3e7ab5cad64',
    'm801058089-288b02559b9bb80543f723b3',
    'm803106992-e669b60d01a9c8e044a2c2eb',
    'm800965944-8e0ef5b0c57b1b0c12948018'
];

async function fetchMonitors(apiKey) {
    const response = await fetch('https://api.uptimerobot.com/v2/getMonitors', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: new URLSearchParams({
            api_key: apiKey,
            format: 'json',
            logs: '0',
            response_times: '0'
        })
    });

    return await response.json();
}

function getStatusText(status) {
    switch(status) {
        case 0:
            return { text: 'Paused', class: 'paused' };
        case 1:
            return { text: 'Not Checked Yet', class: 'unknown' };
        case 2:
            return { text: 'Operational', class: 'up' };
        case 8:
            return { text: 'Seems Down', class: 'down' };
        case 9:
            return { text: 'Down', class: 'down' };
        default:
            return { text: 'Unknown', class: 'unknown' };
    }
}

async function loadStatus() {
    const grid = document.getElementById('statusGrid');
    const summary = document.getElementById('summary');

    grid.innerHTML = '';

    let total = 0;
    let operational = 0;

    try {
        for (const key of apiKeys) {
            const data = await fetchMonitors(key);

            if (data.monitors) {
                data.monitors.forEach(monitor => {
                    total++;

                    const statusInfo = getStatusText(monitor.status);

                    if (monitor.status === 2) {
                        operational++;
                    }

                    const card = document.createElement('div');
                    card.className = 'card';

                    card.innerHTML = `
                        <div class="service-name">${monitor.friendly_name}</div>
                        <div>
                            <span class="status ${statusInfo.class}">${statusInfo.text}</span>
                        </div>
                        <p><strong>Type:</strong> ${monitor.type === 1 ? 'HTTP(s)' : 'Other'}</p>
                        <p><strong>URL/IP:</strong> ${monitor.url || 'N/A'}</p>
                        <p><strong>Interval:</strong> ${monitor.interval} minutes</p>
                    `;

                    grid.appendChild(card);
                });
            }
        }

        summary.innerHTML = `
            <h2>${operational}/${total} Services Operational</h2>
            <p>Last Updated: ${new Date().toLocaleString()}</p>
        `;

    } catch (error) {
        console.error(error);
        summary.innerHTML = '<h2>Unable to load status</h2>';
    }
}

loadStatus();

setInterval(loadStatus, 60000);

</script>

</body>
</html>
